name: Release mod

on:
  workflow_call:
    inputs:
      mod-folder:
        required: true
        type: string
      skip-update-details:
        required: false
        default: false
        type: boolean
    secrets:
      factorio-api-key:
        required: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ${{ github.ref_name }}
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          persist-credentials: false
          fetch-depth: 100
          fetch-tags: true

      - id: mod-name
        name: Get mod name from info.json
        run: echo "mod_name=$(jq -r '.name' ${{ inputs.mod-folder }}/info.json)" >> $GITHUB_OUTPUT

      - id: mod-version
        name: Get mod version from info.json
        run: echo "mod_version=$(jq -r '.version' ${{ inputs.mod-folder }}/info.json)" >> $GITHUB_OUTPUT

      - id: mod-exists
        name: Check if mod version already exists on mod portal
        run: response=$(curl --silent --output /dev/null --write-out "%{http_code}" "https://mods.factorio.com/api/mods/${{ steps.mod-name.outputs.mod_name }}"); echo "response=$response" >> $GITHUB_OUTPUT

      - id: create-mod-package
        name: Create mod package
        uses: TheBrutalX/factorio-mod-uploader-action@v2
        with:
          action: compress
          mod-name: ${{ steps.mod-name.outputs.mod_name }}
          mod-folder: ${{ inputs.mod-folder }}
          mod-version: ${{ steps.mod-version.outputs.mod_version }}
          auto-update-version: false

      - name: Extract changelog for release notes
        run: |
          echo "Extracting release notes from changelog..."

          # Extract the latest version's changes from changelog.txt
          VERSION=${{ steps.mod-version.outputs.mod_version }}

          # Extract base release notes and get line numbers
          awk "/Version: $VERSION/,/^---/" ${{ inputs.mod-folder }}/changelog.txt | head -n -1 | tail -n +3 > ${{ inputs.mod-folder }}/raw_changelog.tmp

          # Find the starting line number of this version in the original file
          VERSION_LINE=$(grep -n "Version: $VERSION" ${{ inputs.mod-folder }}/changelog.txt | cut -d: -f1)
          START_LINE=$((VERSION_LINE + 2))  # Skip version line and date line

          echo "Version starts at line $START_LINE in changelog.txt"

          # Process each line and add PR references using git blame
          line_num=$START_LINE
          > ${{ inputs.mod-folder }}/release_notes.md

          while IFS= read -r line; do
            if [[ $line == "  "[A-Z]*":" ]]; then
              # Category header
              category=$(echo "$line" | sed 's/^  \([A-Z][a-zA-Z]*\):$/### \1/')
              echo "$category" >> ${{ inputs.mod-folder }}/release_notes.md
            elif [[ $line == "    - "* ]]; then
              # Feature line - get ALL PR references that modified this line since last release
              feature_text="${line#    - }"

              # Get the previous release tag
              PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

              # Get all commits that modified this specific line since previous release
              if [ -n "$PREV_TAG" ]; then
                # Use git log -L to get line history since previous release
                line_commits=$(git log -L${line_num},${line_num}:${{ inputs.mod-folder }}/changelog.txt --format="%H" ${PREV_TAG}..HEAD 2>/dev/null || echo "")
              else
                # For first release, get complete line history from beginning
                line_commits=$(git log -L${line_num},${line_num}:${{ inputs.mod-folder }}/changelog.txt --format="%H" 2>/dev/null || echo "")
              fi

              # Collect all PR references from commits that modified this line
              pr_refs=""
              unique_prs=""

              for commit_hash in $line_commits; do
                if [ -n "$commit_hash" ]; then
                  # Get the commit message for this hash
                  commit_msg=$(git log --format=%s -n 1 "$commit_hash" 2>/dev/null || echo "")

                  # Extract PR number from commit message
                  pr_ref=$(echo "$commit_msg" | grep -oE '#[0-9]+' | head -1)

                  if [ -n "$pr_ref" ] && [[ ! "$unique_prs" =~ $pr_ref ]]; then
                    unique_prs="$unique_prs $pr_ref"
                    if [ -n "$pr_refs" ]; then
                      pr_refs="$pr_refs, $pr_ref"
                    else
                      pr_refs="$pr_ref"
                    fi
                    echo "  Line $line_num -> $pr_ref (commit: ${commit_hash:0:7})"
                  fi
                fi
              done

              # Format the changelog entry with all PR references
              if [ -n "$pr_refs" ]; then
                echo "- $feature_text ($pr_refs)" >> ${{ inputs.mod-folder }}/release_notes.md
              else
                echo "- $feature_text" >> ${{ inputs.mod-folder }}/release_notes.md
              fi
            elif [[ -n "$line" ]]; then
              # Other non-empty lines
              echo "$line" >> ${{ inputs.mod-folder }}/release_notes.md
            else
              # Empty lines
              echo "" >> ${{ inputs.mod-folder }}/release_notes.md
            fi

            line_num=$((line_num + 1))
          done < ${{ inputs.mod-folder }}/raw_changelog.tmp

          # Clean up
          rm -f ${{ inputs.mod-folder }}/raw_changelog.tmp

          echo "Release notes prepared with git blame PR references"

      - name: Release mod package
        if: env.ZIP_FILE != ''
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ inputs.mod-folder }}/release_notes.md
          name: ${{ steps.mod-version.outputs.mod_version }}
          tag_name: v${{ steps.mod-version.outputs.mod_version }}
          target_commitish: ${{ github.ref }}
          files: |
            ${{ env.ZIP_FILE }}
          fail_on_unmatched_files: true
          make_latest: true

      - name: Publish to mod portal
        uses: TheBrutalX/factorio-mod-uploader-action@v2
        env:
          PROCESS_CREATE_ON_PORTAL: "${{ steps.mod-exists.outputs.response == 200 && 'false' || 'true' }}"
        with:
          action: upload
          mod-name: ${{ steps.mod-name.outputs.mod_name }}
          mod-folder: ${{ inputs.mod-folder }}
          mod-version: ${{ steps.mod-version.outputs.mod_version }}
          factorio-api-key: ${{ secrets.factorio-api-key }}
          skip-update-details: ${{ inputs.skip-update-details }}
